[meta]
config.version = 17

[system]
env.name = local

[node]
root.dir = ${CONFIG_DIR}/benchmarks
src.root.dir = ${CONFIG_DIR}/benchmarks/src

[source]
remote.repo.url = https://github.com/apache/solr.git
src.subdir = solr

[benchmarks]
local.dataset.cache = ${CONFIG_DIR}/benchmarks/data

[reporting]
datastore.type = in-memory
datastore.host =
datastore.port =
datastore.secure = False
datastore.user =
datastore.password =


[workloads]
default.url = https://github.com/janhoy/solr-benchmark-workloads

[cluster_configs]
default.dir = default-cluster-config

[defaults]
preserve_benchmark_candidate = false

[distributions]
release.cache = true

[redline]
scale_step = 5
scaledown_percentage = 0.10
post_scaledown_sleep = 30
cpu_window_seconds = 30
cpu_check_interval = 30