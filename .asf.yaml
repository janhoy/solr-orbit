# Apache Software Foundation repository configuration
# See https://github.com/apache/infrastructure-asfyaml/blob/main/README.md

github:
  # Repository metadata
  description: "Apache Solr Orbit macrobenchmarking framework"
  homepage: https://solr.apache.org/
  labels:
    - apache
    - solr
    - benchmarking
    - performance
    - macrobenchmark
    - python

  # Enable GitHub Issues; disable unused features
  features:
    issues: true
    wiki: false
    projects: false
    discussions: false

  # Allow squash merges only (keeps a linear, clean history)
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: false

  # Auto-delete head branch after a PR is merged
  delete_branch_on_merge: true

  # GitHub Pages
  ghp_branch: gh-pages
  ghp_path: ~

  # Branch protection ruleset
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true

notifications:
  commits: commits@solr.apache.org
  issues: issues@solr.apache.org
  pullrequests: issues@solr.apache.org
  pullrequests_status: dev@solr.apache.org
  pullrequests_comment: issues@solr.apache.org
