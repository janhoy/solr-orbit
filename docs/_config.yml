title: Apache Solr Benchmark
description: >-
  A performance benchmarking tool for Apache Solr clusters,
  derived from OpenSearch Benchmark.

theme: just-the-docs

url: https://janhoy.github.io
# baseurl is injected automatically by actions/configure-pages during CI

aux_links:
  "GitHub": https://github.com/janhoy/solr-benchmark
  "Apache Solr": https://solr.apache.org
  "Apache Software Foundation": https://www.apache.org

aux_links_new_tab: true

search_enabled: true

search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Callout blocks
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Heading anchors
heading_anchors: true

# External navigation links
nav_external_links:
  - title: Apache Solr
    url: https://solr.apache.org
  - title: ASF
    url: https://www.apache.org

# Color scheme (light by default)
color_scheme: light

# Apply the just-the-docs layout to every page by default
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Suppress @import deprecation warnings from the just-the-docs gem's SCSS
sass:
  quiet_deps: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
