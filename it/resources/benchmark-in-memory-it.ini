[meta]
config.version = 17

[system]
env.name = local

[node]
root.dir = ${CONFIG_DIR}/benchmarks
src.root.dir = ${CONFIG_DIR}/benchmarks/src

[source]
remote.repo.url = https://github.com/apache/solr.git
src.subdir = solr

[benchmarks]
local.dataset.cache = ${CONFIG_DIR}/benchmarks/data

[reporting]
datastore.type = in-memory


[workloads]
default.url = https://github.com/janhoy/solr-benchmark-workloads

[cluster_configs]
default.dir = default-cluster-config

[defaults]
preserve_benchmark_candidate = False

[distributions]
release.cache = true

